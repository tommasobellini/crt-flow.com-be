name: CRT Flow Intraday Scanner

on:
  schedule:
    # Gira al minuto 5 di ogni ora, dalle 14:00 UTC (15:05 ITA) alle 21:00 UTC (22:05 ITA), lun-ven
    - cron: '5 14-21 * * 1-5'
  workflow_dispatch: # Ti permette di avviarlo a mano con un click per testare

jobs:
  build:
    runs-on: ubuntu-latest
    # Rimosso 'environment: PROD' per far leggere subito i Secrets di base
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scanner
        env:
          # Prende le chiavi dai Secrets standard di GitHub
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scanner.py --all